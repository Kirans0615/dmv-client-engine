name: Mockup request
on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  build-mockup:
    # only run for mockup-labeled issues opened by the repo owner (the dashboard files them with his token)
    if: contains(github.event.issue.labels.*.name, 'mockup') && github.event.issue.user.login == github.repository_owner
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - name: Acknowledge
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh issue comment ${{ github.event.issue.number }} -R ${{ github.repository }} -b "🎨 Claude is designing the mockup now — the live link will appear here in a few minutes."
      - name: Generate and publish mockup with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ github.token }}
          claude_args: "--dangerously-skip-permissions --model claude-sonnet-5"
          prompt: |
            You are an elite web designer-developer producing a client-ready website mockup that must feel custom-made, expensive, and specific to the business — never like a template. Work autonomously to completion.

            THE BRIEF is the body of GitHub issue #${{ github.event.issue.number }} in ${{ github.repository }} (also readable at .github/ISSUE — just use this text):
            ---
            ${{ github.event.issue.body }}
            ---
            If the brief names an assets folder (mockup-requests/…), those files are in the checked-out repo: a file named logo.* is the logo (extract its palette and build the color system around it); others are photos — use them all meaningfully.

            IMAGERY — make it look like a real photographer shot it (unless the brief says "Stock imagery: no"):
            FIRST check the pre-vetted library in the checked-out repo at stock/ — folders are named by business category and every photo in them is already approved (real, professional, license-safe). If a folder fits this business, copy 2–4 of its photos into your assets/ and skip live searching entirely, or search only for ONE business-specific extra (e.g. the signature dish). Kick off any live downloads in the background with `curl ... &` on your very first tool call and draft the HTML while they arrive.
            When the library doesn't cover it and the brief provides no photos, source REAL photography — never AI-generated imagery, never obvious clip-art:
            1. If the PEXELS_API_KEY env var is non-empty, use the Pexels API (header "Authorization: $PEXELS_API_KEY"): GET https://api.pexels.com/v1/search?query=<specific query>&per_page=8&orientation=landscape for 2–4 concrete queries tied to the business (e.g. "pupusas griddle", "barber fade haircut", "cozy cafe interior"). Download the src.large2x of promising candidates. AND source one hero background video: GET https://api.pexels.com/videos/search?query=…&per_page=6, pick an HD mp4 under 8MB that fits the brand, use it as a muted looping autoplay playsinline hero background with a poster image and the text-over-imagery scrim contract below; pause it under prefers-reduced-motion. Pexels requires no attribution. If no key is set, the Ken Burns hero motion below is the substitute for video.
            2. Otherwise use keyless sources: Openverse (GET https://api.openverse.org/v1/images/?q=<query>&license=cc0,pdm,by&size=large&per_page=8) and Wikimedia Commons (commons.wikimedia.org API, namespace 6 search with iiurlwidth=1600). Prefer CC0/public domain; CC-BY is fine but must be credited — add a small "Photo credits" line in the footer naming the photographers.
            3. VET every downloaded image by actually viewing it with the Read tool: keep only real photographs that are relevant, professional, well-lit, watermark-free, text-free, and not AI-generated-looking. Reject and re-search freely — 3 great photos beat 6 mediocre ones.
            4. Compress before committing: ImageMagick is installed — `convert in.jpg -resize 1600x -quality 82 out.jpg`; each image ≤400KB, video ≤8MB, whole repo ≤15MB.
            5. Grade everything cohesively in CSS (one consistent overlay/treatment across photos) so mixed sources read as one brand shoot. Photos provided in the brief always take priority; sourced ones supplement.

            BUILD a single-file website in a NEW directory /tmp/site: index.html (all CSS/JS inline) plus an assets/ folder with copies of any provided images (and the sourced stock files), referenced by relative path. Also add an empty .nojekyll file.

            Design bar: NEVER use generic AI aesthetics (no Inter/Roboto/Arial/system fonts, no purple gradients, no cookie-cutter layouts). Distinctive Google Fonts pairing, cohesive palette from the industry/logo, CSS custom properties with a 4/8px rhythm, body ≥16px, contrast ≥4.5:1, focus-visible states, semantic HTML, alt text. Sticky nav that condenses on scroll; working accessible mobile hamburger; fluid clamp() type; no horizontal scroll. Benefit-led hero (never "Welcome to X"), 4–7 sections chosen for THIS business type, 2–3 plausible first-name testimonials, story section from the brief, footer with the provided contact info and a final CTA. Add requested features AND the ones you judge right for the business. Forms are visually complete but use mailto:/tel:. Real specific copy, zero lorem ipsum. Include <title>, meta description, and the footer line: "Website mockup by Kiran Sen · kirans0615@gmail.com".

            ADVANCED LAYOUT & MOTION — this must feel like a $5,000 agency site, not a template:
            - Layout: pick 2–3 advanced patterns that genuinely fit the business: bento grid, asymmetric editorial splits, overlapping sections (negative margins / photos breaking the grid), sticky side rail, horizontal-scroll gallery, diagonal or curved section dividers, oversized display type with an italic or outlined accent word.
            - Motion: staggered IntersectionObserver reveals (transform+opacity only, 150–500ms, 40–80ms stagger); slow Ken Burns zoom-pan (12–20s alternating) on hero and large photos so imagery feels alive even without video; subtle parallax on one or two accents; hover micro-interactions (card lift, image zoom-within-frame, underline draw); animated stat/number counters where relevant. Everything disabled under prefers-reduced-motion.
            - TEXT-OVER-IMAGERY CONTRACT (non-negotiable): every word placed over a photo or video must be contrast-engineered — a gradient scrim (dark or brand-tinted, 45–75% opacity where the text sits), a solid/blurred panel, or text repositioned off the busy area. Never rely on the raw image behind text. Effective contrast ≥4.5:1 at every text position, desktop and mobile.

            SELF-REVIEW (one fast pass, before publishing): Chrome is preinstalled. Render and screenshot the finished file — `google-chrome --headless=new --disable-gpu --window-size=1440,2400 --screenshot=/tmp/desktop.png file:///tmp/site/index.html` and again with --window-size=390,1600 for mobile — then VIEW both screenshots and fix what you see: text over imagery that's hard to read, broken/overflowing layout, images that failed to load, cramped mobile spacing. One fix round, re-screenshot to confirm, then ship. Do not loop further.

            PACE: speed is a feature — target ~6 minutes end to end. Use the stock/ library instead of live searches whenever possible; if searching live, ≤4 downloads / 2–3 keepers, one retry max. One self-review fix round only. Write the HTML in one decisive pass — no rewrites, no exploring alternatives.

            PUBLISH (the MOCKUP_PAT env var is a GitHub token with repo-creation rights; gh is installed):
            1. cd /tmp/site && git init -b main && git add -A && git commit -m "Mockup"
            2. export GH_TOKEN="$MOCKUP_PAT"; SLUG="<business-name-slug>-mockup"; gh repo create "$SLUG" --public --source=. --push (on name collision append a random 3-digit number)
            3. gh api -X POST repos/${{ github.repository_owner }}/$SLUG/pages -f "source[branch]=main" -f "source[path]=/" (ignore a 409)
            4. Wait only until gh api repos/${{ github.repository_owner }}/$SLUG/pages/builds/latest --jq .status reports "built" (check every 10s). If it is still not "built" after 60s, the first build sometimes wedges — force a fresh one with gh api -X POST repos/${{ github.repository_owner }}/$SLUG/pages/builds and wait up to 60s more. Then move on regardless (the CDN propagates on its own; do NOT poll the live URL).
            5. Immediately comment on issue #${{ github.event.issue.number }} in ${{ github.repository }} with exactly this format on the first line: "✅ Mockup live: https://<owner>.github.io/<slug>/" followed by one sentence describing the design direction. Then close the issue.
            If anything fails unrecoverably, comment "❌ Mockup failed: <reason>" on the issue so the dashboard stops waiting.
        env:
          MOCKUP_PAT: ${{ secrets.MOCKUP_PAT }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      - name: Guarantee a result comment
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          N=${{ github.event.issue.number }}
          R=${{ github.repository }}
          if ! gh api repos/$R/issues/$N/comments --jq '.[].body' | grep -qE "✅ Mockup live:|❌ Mockup failed"; then
            gh issue comment $N -R $R -b "❌ Mockup failed: the run ended without reporting a result. It may still have published — check https://github.com/${{ github.repository_owner }}?tab=repositories for a new repo — or just submit the request again."
          fi
