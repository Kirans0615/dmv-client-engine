name: Refresh lead snapshots
on:
  schedule:
    - cron: "0 9 * * 1" # every Monday 9:00 UTC (~4-5am ET), before the Monday lead pull
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compile verified no-website leads from Overture business data
        run: |
          pip install --quiet overturemaps
          python scripts/fetch_leads.py
      - name: Commit updated snapshots
        run: |
          git config user.name "lead-refresh-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" || git commit -m "Weekly lead snapshot refresh"
          git push
