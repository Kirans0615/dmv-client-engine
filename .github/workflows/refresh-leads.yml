name: Refresh lead snapshots
on:
  schedule:
    - cron: "0 9 * * 1" # every Monday 9:00 UTC (~4-5am ET), before the Monday lead pull
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch fresh no-website leads from Overpass
        run: node scripts/fetch-osm.js
      - name: Commit updated snapshots
        run: |
          git config user.name "lead-refresh-bot"
          git config user.email "actions@github.com"
          git add data/
          git diff --cached --quiet && echo "No changes" || git commit -m "Weekly lead snapshot refresh"
          git push
